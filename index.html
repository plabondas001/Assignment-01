<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>DevConf</title>
  </head>
  <body>
    <!-- navbar start -->
    <nav class="navbar common-width">
      <div>
        <img src="./assets/logo.png" alt="nav-logo" />
      </div>
      <ul>
        <li><a href="#speakers">Speakers</a></li>
        <li><a href="#schedule">Schedule</a></li>
        <li><a href="#tracks">Tracks</a></li>
        <li><a href="#venue">Venue</a></li>
        <li><a href="#blog">Blog</a></li>
      </ul>
      <button class="primary-btn">Register Now</button>
    </nav>

    <!-- banner section -->
    <section class="banner">
      <div class="banner-content">
        <div class="banner-text">
          <h1>Code. <em>Connect</em>. Create</h1>
          <p>
            Join 4,000+ engineers, founders, and builders at the premier
            developer conference of 2026. Three days of cutting-edge talks,
            hands-on workshops, and meaningful connections.
          </p>
        </div>
        <div class="banner-btn">
          <button
            style="font-size: 30px; font-weight: bold"
            class="primary-btn"
          >
            Register Now
          </button>
        </div>
      </div>
    </section>
  </body>
</html>
